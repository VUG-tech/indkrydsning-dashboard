<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Indkrydsning Dashboard - Live & Historik</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    :root {
      --blue: #4aaee0; --blue-dark: #2e8fc7; --navy: #1a3a5c; --came: #2eaaa0;
      --left: #e05c4a; --bg: #eef0f2; --surface: #ffffff; --border: #d0d5db;
      --text: #2c3e50; --text-dim: #7f8c9a; --sensor-ind: #2eaaa0;
      --sensor-ud: #e05c4a; --sensor-accent: #4aaee0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    header { background: var(--navy); padding: 18px 32px; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-size: 20px; font-weight: 700; color: #fff; }
    .logo span { color: var(--blue); }
    #sync-status { font-size: 12px; color: rgba(255,255,255,0.6); display: flex; align-items: center; gap: 6px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #4ae0a0; }
    .dot.loading { background: #f0a500; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .main { padding: 24px 32px; max-width: 1200px; margin: 0 auto; }
    
    .section-divider { display: flex; align-items: center; gap: 12px; margin: 30px 0 20px 0; }
    .section-divider-title { font-size: 14px; font-weight: 700; color: var(--navy); text-transform: uppercase; }
    .section-divider-line { flex: 1; height: 1px; background: var(--border); }

    .filters { background: var(--surface); border-radius: 10px; padding: 18px 20px; margin-bottom: 20px; border: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-end; }
    .filter-group { display: flex; flex-direction: column; gap: 5px; }
    .filter-group label { font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--text-dim); }
    .filter-group select, .filter-group input { padding: 7px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); font-size: 13px; }

    .sensor-kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .sensor-kpi-card { background: var(--surface); border-radius: 10px; padding: 16px 20px; border: 1px solid var(--border); border-top: 4px solid var(--sensor-accent); }
    .kpi-label { font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--text-dim); }
    .kpi-value { font-size: 32px; font-weight: 700; margin: 5px 0; }
    
    .chart-card { background: var(--surface); border-radius: 10px; padding: 20px; border: 1px solid var(--border); margin-bottom: 24px; }
    .chart-title { font-size: 13px; font-weight: 700; margin-bottom: 15px; }
    .chart-wrap { height: 300px; position: relative; }

    .table-card { background: var(--surface); border-radius: 10px; border: 1px solid var(--border); overflow: hidden; }
    .table-wrap { max-height: 400px; overflow-y: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: var(--bg); padding: 12px; text-align: left; font-weight: 600; color: var(--text-dim); position: sticky; top: 0; }
    td { padding: 10px; border-bottom: 1px solid #eee; }
    .tag { padding: 2px 8px; border-radius: 4px; color: #fff; font-size: 11px; font-weight: bold; }
    .IND { background: var(--sensor-ind); } .UD { background: var(--sensor-ud); }
  </style>
</head>
<body>

<header>
  <div class="logo">Easy<span>Kom</span> Sensor Dashboard</div>
  <div id="sync-status"><div class="dot" id="sync-dot"></div><span id="sync-text">Forbundet</span></div>
</header>

<div class="main">
  <div class="section-divider">
    <div class="section-divider-title">Live Overblik & Historik</div>
    <div class="section-divider-line"></div>
  </div>

  <div class="filters">
    <div class="filter-group">
      <label>Lokation</label>
      <select id="sensor-filter-loc"><option value="HJEMMETEST">HJEMMETEST</option></select>
    </div>
    <div class="filter-group">
      <label>Dato</label>
      <input type="date" id="sensor-filter-dato">
    </div>
  </div>

  <div class="sensor-kpi-row">
    <div class="sensor-kpi-card" style="border-top-color: var(--sensor-accent)">
      <div class="kpi-label">Belægning lige nu</div>
      <div class="kpi-value" id="sensor-belaegning">0</div>
    </div>
    <div class="sensor-kpi-card" style="border-top-color: var(--sensor-ind)">
      <div class="kpi-label">Total Ind</div>
      <div class="kpi-value" id="sensor-ind">0</div>
    </div>
    <div class="sensor-kpi-card" style="border-top-color: var(--sensor-ud)">
      <div class="kpi-label">Total Ud</div>
      <div class="kpi-value" id="sensor-ud">0</div>
    </div>
  </div>

  <div class="chart-card">
    <div class="chart-title">Belægningshistorik (Personer i lokalet over tid)</div>
    <div class="chart-wrap">
      <canvas id="historyChart"></canvas>
    </div>
  </div>

  <div class="table-card">
    <div class="table-wrap">
      <table>
        <thead><tr><th>Tid</th><th>Lokation</th><th>Retning</th><th>Total efter bevægelse</th></tr></thead>
        <tbody id="sensor-table-body"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
var SHEET_ID = '1aDO-EDMx9BQ5vPyTz2zpHAVT9ezQZc_nJec4DQUVW9k';
var SENSOR_SHEET_NAME = 'Occupancy';
var allSensorData = [];
var historyChart = null;

function fetchSensorData() {
  var url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SENSOR_SHEET_NAME)}`;
  
  document.getElementById('sync-dot').classList.add('loading');
  
  fetch(url).then(r => r.text()).then(csv => {
    allSensorData = parseCSV(csv);
    renderDashboard();
    document.getElementById('sync-dot').classList.remove('loading');
  });
}

function parseCSV(csv) {
  var lines = csv.trim().split('\n');
  return lines.slice(1).map(line => {
    var cols = line.split('","').map(c => c.replace(/^"|"$/g, '').trim());
    return {
      tidsstempel: cols[0],
      location: cols[1],
      count: parseInt(cols[2]),
      direction: cols[3],
      dato: cols[4],
      klokkeslet: cols[5]
    };
  });
}

function renderDashboard() {
  var loc = document.getElementById('sensor-filter-loc').value;
  var selectedDato = document.getElementById('sensor-filter-dato').value;
  
  // Filtrer data for den valgte dag og lokation
  var dayData = allSensorData.filter(r => r.location === loc && r.dato === selectedDato);
  
  // Sorter data efter tidspunkt (vigtigt for grafen)
  dayData.sort((a, b) => a.tidsstempel.localeCompare(b.tidsstempel));

  var currentOccupancy = 0;
  var timelineLabels = [];
  var timelineData = [];
  var totalInd = 0;
  var totalUd = 0;

  var tableBody = document.getElementById('sensor-table-body');
  tableBody.innerHTML = '';

  dayData.forEach(r => {
    if (r.direction === 'IND') {
      currentOccupancy++;
      totalInd++;
    } else {
      currentOccupancy = Math.max(0, currentOccupancy - 1);
      totalUd++;
    }

    // Gem data til grafen
    timelineLabels.push(r.klokkeslet);
    timelineData.push(currentOccupancy);

    // Tilføj til tabel
    var row = `<tr>
      <td>${r.klokkeslet}</td>
      <td>${r.location}</td>
      <td><span class="tag ${r.direction}">${r.direction}</span></td>
      <td><b>${currentOccupancy}</b></td>
    </tr>`;
    tableBody.insertAdjacentHTML('afterbegin', row);
  });

  // Opdater KPI-kort
  document.getElementById('sensor-belaegning').textContent = currentOccupancy;
  document.getElementById('sensor-ind').textContent = totalInd;
  document.getElementById('sensor-ud').textContent = totalUd;

  updateChart(timelineLabels, timelineData);
}

function updateChart(labels, data) {
  var ctx = document.getElementById('historyChart').getContext('2d');
  
  if (historyChart) {
    historyChart.destroy();
  }

  historyChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: 'Personer i lokalet',
        data: data,
        borderColor: '#4aaee0',
        backgroundColor: 'rgba(74, 174, 224, 0.2)',
        fill: true,
        stepped: true, // Gør grafen "firkantet" så den viser præcis hvornår folk går ind/ud
        tension: 0
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        y: { beginAtZero: true, ticks: { stepSize: 1 } }
      }
    }
  });
}

// Initialisering
document.getElementById('sensor-filter-dato').value = new Date().toISOString().split('T')[0];
document.getElementById('sensor-filter-dato').addEventListener('change', renderDashboard);
document.getElementById('sensor-filter-loc').addEventListener('change', renderDashboard);

fetchSensorData();
setInterval(fetchSensorData, 5000); // Tjekker for ny data hvert 5. sekund
</script>
</body>
</html>
